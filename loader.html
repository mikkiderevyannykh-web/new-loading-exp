<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beeline Loader</title>
<style>
@font-face {
  font-family: 'BeelineSans';
  src: url('fonts/BeelineSans-Regular.woff2') format('woff2'),
       url('fonts/BeelineSans-Regular.ttf') format('truetype');
  font-weight: 400;
  font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'BeelineSans', Georgia, serif;
}
.phone {
  width: 300px; height: 540px;
  border-radius: 40px; overflow: hidden; position: relative;
  background: #080600;
  border: 1.5px solid rgba(255,210,0,0.12);
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
.beam { position: absolute; top: 0; height: 70%; border-radius: 0 0 60% 60%; filter: blur(18px); mix-blend-mode: screen; animation: sway linear infinite; transform-origin: top center; }
.beam-1  { left: 5%;  width: 60px;  background: linear-gradient(180deg, #FFD200 0%, #FF8C00 40%, transparent 100%); opacity: 0.7; animation-duration: 6s;   animation-delay: 0s; }
.beam-2  { left: 15%; width: 30px;  background: linear-gradient(180deg, #FFA500 0%, #FF6000 50%, transparent 100%); opacity: 0.5; animation-duration: 8s;   animation-delay: -2s; }
.beam-3  { left: 25%; width: 80px;  background: linear-gradient(180deg, #FFD200 0%, #FFAA00 30%, #FF5500 60%, transparent 100%); opacity: 0.8; animation-duration: 7s;   animation-delay: -1s; }
.beam-4  { left: 38%; width: 25px;  background: linear-gradient(180deg, #FFC000 0%, #FF7000 50%, transparent 100%); opacity: 0.45; animation-duration: 9s;  animation-delay: -3s; }
.beam-5  { left: 47%; width: 90px;  background: linear-gradient(180deg, #FFE040 0%, #FFB300 25%, #FF6600 55%, transparent 100%); opacity: 0.85; animation-duration: 6.5s; animation-delay: -0.5s; }
.beam-6  { left: 60%; width: 35px;  background: linear-gradient(180deg, #FFD200 0%, #FF8000 45%, transparent 100%); opacity: 0.5; animation-duration: 10s;  animation-delay: -4s; }
.beam-7  { left: 68%; width: 70px;  background: linear-gradient(180deg, #FFCC00 0%, #FF9900 35%, #CC4400 65%, transparent 100%); opacity: 0.75; animation-duration: 7.5s; animation-delay: -1.5s; }
.beam-8  { left: 80%; width: 40px;  background: linear-gradient(180deg, #FFD200 0%, #FF7700 50%, transparent 100%); opacity: 0.55; animation-duration: 8.5s; animation-delay: -2.5s; }
.beam-9  { left: 88%; width: 55px;  background: linear-gradient(180deg, #FFE000 0%, #FFAA00 30%, transparent 100%); opacity: 0.6; animation-duration: 9.5s; animation-delay: -3.5s; }
@keyframes sway {
  0%   { transform: scaleX(1)    skewX(0deg)  scaleY(1); }
  25%  { transform: scaleX(1.15) skewX(3deg)  scaleY(1.05); }
  50%  { transform: scaleX(0.9)  skewX(-4deg) scaleY(0.95); }
  75%  { transform: scaleX(1.1)  skewX(2deg)  scaleY(1.08); }
  100% { transform: scaleX(1)    skewX(0deg)  scaleY(1); }
}
.glow-base { position: absolute; top: 0; left: 0; right: 0; height: 45%; background: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(255,200,0,0.18) 0%, rgba(255,120,0,0.08) 50%, transparent 100%); animation: pulse-glow 4s ease-in-out infinite; }
@keyframes pulse-glow { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
.star { position: absolute; background: rgba(255,230,150,0.8); border-radius: 50%; animation: twinkle ease-in-out infinite; }
@keyframes twinkle { 0%, 100% { opacity: 0.1; transform: scale(0.8); } 50% { opacity: 0.9; transform: scale(1.2); } }
.ui {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 56px;
}
.label-wrap {
  width: 100%;
  max-width: 240px;
  height: 48px;
  margin: 0 auto 32px auto;
  position: relative;
}
.label {
  position: absolute;
  inset: 0;
  width: 100%;
  font-size: 17px;
  color: rgba(255,210,0,0.55);
  letter-spacing: 0.05em;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.label.active {
  opacity: 1;
  transform: translateY(0);
}
.dots { display: flex; gap: 8px; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: #FFD200; animation: blink 1.4s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.22s; }
.dot:nth-child(3) { animation-delay: 0.44s; }
@keyframes blink { 0%, 100% { opacity: 0.15; transform: scale(0.75); } 50% { opacity: 1; transform: scale(1.25); } }
</style>
</head>
<body>
<div class="phone">
  <div class="beam beam-1"></div>
  <div class="beam beam-2"></div>
  <div class="beam beam-3"></div>
  <div class="beam beam-4"></div>
  <div class="beam beam-5"></div>
  <div class="beam beam-6"></div>
  <div class="beam beam-7"></div>
  <div class="beam beam-8"></div>
  <div class="beam beam-9"></div>
  <div class="glow-base"></div>
  <div class="stars" id="stars"></div>
  <div class="ui">
    <div class="label-wrap" id="labelWrap"></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>
<script>
const s = document.getElementById('stars');
for (let i = 0; i < 55; i++) {
  const d = document.createElement('div');
  d.className = 'star';
  const size = 1 + Math.random() * 2;
  d.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*80)+'%;animation-duration:'+(1.5+Math.random()*3)+'s;animation-delay:'+(Math.random()*3)+'s;';
  s.appendChild(d);
}

const phrases = [
  'загружаем данные, осталось чуть-чуть',
  'загрузили данные, шифруем их, чтобы ничего не потерять',
  'почти готово, осталось причесать пиксели'
];

const wrap = document.getElementById('labelWrap');
const labelEls = phrases.map(text => {
  const el = document.createElement('div');
  el.className = 'label';
  el.textContent = text;
  wrap.appendChild(el);
  return el;
});

let current = 0;
labelEls[0].classList.add('active');

function nextPhrase() {
  labelEls[current].classList.remove('active');
  current = (current + 1) % labelEls.length;
  labelEls[current].classList.add('active');
}

setInterval(nextPhrase, 4800);
</script>
</body>
</html>
